<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save It – Before You Waste It</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<!-- Chart.js a grafikonhoz -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Save It</h1>
<p>Before You Waste It</p>
<nav>
<button onclick="showMap()">Térkép</button>
<button onclick="showShopping()">Bevásárlólista</button>
<button onclick="logout()">Kilépés</button>
</nav>
</header>

<!-- LOGIN -->
<div id="loginScreen">
<input id="username" placeholder="Felhasználónév">
<input id="password" type="password" placeholder="Jelszó">
<button onclick="login()">Belépés</button>
<br><br>
<button onclick="register()">Regisztráció</button>
</div>

<!-- APP -->
<div id="app">

<!-- MAP -->
<div id="map">
<div class="place" id="fridge"><h3>Hűtő</h3></div>
<div class="place" id="freezer"><h3>Fagyasztó</h3></div>
<div class="place" id="pantry"><h3>Kamra</h3></div>
<div class="place" id="bath"><h3>Fürdő</h3></div>
<div class="place" id="meds"><h3>Gyógyszerek</h3></div>
<div class="place" id="cosmetics"><h3>Kozmetikumok</h3></div>
</div>

<!-- Bevásárlólista -->
<div id="shopping">
<h2>Bevásárlólista</h2>
<div id="shoppingList"></div>
</div>

<!-- Grafikon -->
<canvas id="wasteChart" width="400" height="200"></canvas>

</div>

<!-- TERMÉK MODAL -->
<div id="itemModal" class="modal">
<div class="modalContent">
<div id="itemInfo"></div>
<button onclick="consumeItem()">Elfogyasztva</button>
<button onclick="wasteItem()">Kidobva</button>
<button onclick="addShopping()">Bevásárlólistára</button>
<button onclick="deleteItem()">Törlés</button>
<button onclick="closeModal()">Bezárás</button>
</div>
</div>

<script src="storage.js"></script>
<script src="login.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>
<script src="barcode.js"></script>

</body>
</html>
