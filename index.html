<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save It</title>
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: 'Segoe UI', sans-serif; margin:0; padding:0; background:#f5f5f5; }

  /* Header / fejléc */
  .app-header {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #fff;
    text-align: center;
    padding: 1rem 0;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
  }
  .app-header h1 { font-size: 2rem; margin:0; text-shadow:1px 1px 2px rgba(0,0,0,0.2);}
  .app-header .subtitle { font-size:1rem; margin:0; opacity:0.9; }
  .header-nav { margin-top:0.5rem; }
  .header-nav button {
    background-color: rgba(255,255,255,0.2);
    border: none;
    color:#fff;
    padding:0.5rem 1rem;
    margin:0 0.2rem;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
  }
  .header-nav button:hover { background-color: rgba(255,255,255,0.4); }

  /* Regisztráció / Login */
  #loginArea, #registerFields { max-width: 350px; margin: 1rem auto; background:#fff; padding:1rem; border-radius:15px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
  #loginArea input, #registerFields input { width:100%; margin:0.5rem 0; padding:0.5rem; border-radius:10px; border:1px solid #ccc;}
  #loginArea button, #registerFields button { width:100%; padding:0.5rem; border:none; border-radius:10px; background:#ff9a9e; color:#fff; font-weight:bold; cursor:pointer; margin-top:0.5rem;}
  #loginArea button:hover, #registerFields button:hover { background:#fad0c4; }

  /* Modal popup termékhez */
  .modal { position: fixed; top:0; left:0; right:0; bottom:0; background-color: rgba(0,0,0,0.4); display:none; justify-content:center; align-items:center; z-index:1000;}
  .modal-content { background:#fff; padding:1rem; border-radius:15px; max-width:90%; width:350px; box-shadow:0 4px 8px rgba(0,0,0,0.2); display:flex; flex-direction:column; gap:1rem;}
  #itemDetails h3 { margin:0 0 0.5rem 0; font-size:1.2rem; color:#333;}
  #itemDetails p { margin:0.2rem 0; color:#555;}
  .modal-buttons { display:grid; grid-template-columns:repeat(2,1fr); gap:0.5rem;}
  .modal-buttons button { padding:0.5rem; border:none; border-radius:10px; background:#ff9a9e; color:#fff; font-weight:bold; cursor:pointer; transition:0.2s;}
  .modal-buttons button:hover { background:#fad0c4;}
  @media(max-width:400px){ .modal-buttons { grid-template-columns:1fr;} }

  /* Map / Bevásárlólista */
  #mapView, #shoppingView { display:none; padding:1rem; max-width:600px; margin:1rem auto; background:#fff; border-radius:15px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
  .place { min-height:100px; margin:0.5rem 0; padding:0.5rem; border:1px dashed #ccc; border-radius:10px; background-color:#fefefe; display:flex; align-items:flex-end; justify-content:center;}
  .place h3 { background:rgba(255,255,255,0.7); padding:0.2rem 0.5rem; border-radius:5px; }
  .item { display:block; padding:0.3rem; margin:0.2rem 0; background:#ffe6e6; border-radius:5px; cursor:pointer; }
  .item.expired{ background:#ffcccc; }
  .item.soon{ background:#fff0f0; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <h1>🛒 Save It</h1>
    <p class="subtitle">🍏 Before You Waste It!</p>
  </div>
  <nav class="header-nav">
    <button onclick="showMap()">Térkép</button>
    <button onclick="showShopping()">Bevásárlólista</button>
    <button onclick="logout()">Kijelentkezés</button>
  </nav>
</header>

<!-- Regisztráció / Login -->
<div id="loginArea">
  <input id="loginUsername" placeholder="Felhasználónév">
  <input id="loginPassword" type="password" placeholder="Jelszó">
  <button onclick="login()">Bejelentkezés</button>
  <p>Még nincs fiókod? <span style="color:#ff6f91; cursor:pointer;" onclick="document.getElementById('registerFields').style.display='block';">Regisztráció</span></p>
</div>

<div id="registerFields" style="display:none;">
  <input id="regUsername" placeholder="Felhasználónév">
  <input id="regPassword" type="password" placeholder="Jelszó">
  <button onclick="registerForm()">Regisztráció</button>
</div>

<!-- Térkép nézet -->
<div id="mapView">
  <div id="fridge" class="place"><h3>Hűtő</h3></div>
  <div id="freezer" class="place"><h3>Fagyasztó</h3></div>
  <div id="pantry" class="place"><h3>Kamra</h3></div>
