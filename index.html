<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMeddig?</title>

<style>

body{
font-family:Arial;
background:#eef5ff;
padding:20px;
}

h1{text-align:center;}

input,select,button{
margin:5px;
padding:6px;
}

nav button{
margin:5px;
}

.section{display:none;}
.active{display:block;}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.expired{background:#ff7b7b;}
.soon{background:#fff3a6;}
.good{background:#b7f5b7;}

video{
width:250px;
margin-top:10px;
display:none;
border:1px solid #ccc;
}

/* TÉRKÉP */

#map{
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.place{
padding:10px;
min-height:140px;
position:relative;
overflow:hidden;
}

/* HŰTŐ */

#fridge{
border:4px solid #7ec8ff;
border-radius:30px;
background:linear-gradient(#e8f6ff,#cfeeff);
}

/* FAGYASZTÓ */

#freezer{
border:4px solid #8fd3ff;
border-radius:20px;
background:linear-gradient(#e0f7ff,#bfeeff);
}

/* KAMRA */

#pantry{
border:4px solid #caa472;
background:repeating-linear-gradient(
to bottom,
#f7efe3,
#f7efe3 20px,
#e8dccb 20px,
#e8dccb 40px
);
}

/* FÜRDŐ */

#bath{
border:4px solid #9be3d6;
border-radius:20px;
background:linear-gradient(#e8fffb,#c8f5ee);
}

/* GYÓGYSZER */

#meds{
border:4px solid #ff9aa2;
border-radius:15px;
background:#fff1f2;
}

/* KOZMETIKUM */

#cosmetics{
border:4px solid #d9b3ff;
border-radius:15px;
background:#f5e9ff;
}

/* TERMÉK */

.itemdot{
padding:4px 8px;
border-radius:10px;
display:inline-block;
margin:3px;
font-size:12px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login" class="section active">

<h1>Üdv a MiMeddig?-ben</h1>

<p>Add meg a neved:</p>

<input id="username">

<button onclick="login()">Belépés</button>

</div>

<!-- NAV -->

<nav>

<button onclick="show('inventory')">Készlet</button>

<button onclick="show('mapview')">Térkép</button>

<button onclick="show('shopping')">Bevásárlólista</button>

</nav>

<!-- KÉSZLET -->

<div id="inventory" class="section">

<h3>Új termék</h3>

<input id="name" placeholder="Termék">

<input type="date" id="expiry">

<select id="location">

<option value="fridge">🧊 Hűtő</option>

<option value="freezer">❄️ Fagyasztó</option>

<option value="pantry">🗄 Kamra</option>

<option value="bath">🛁 Fürdő</option>

<option value="meds">💊 Gyógyszerek</option>

<option value="cosmetics">🧴 Kozmetikumok</option>

</select>

<button onclick="addItem()">Hozzáadás</button>

<br>

<input id="barcode" placeholder="Barcode">

<button onclick="startScanner()">📷 Barcode</button>

<video id="video" autoplay></video>

<h3>Készlet</h3>

<select onchange="sortItems(this.value)">

<option value="expiry">Rendezés lejárat szerint</option>

<option value="name">Rendezés név szerint</option>

</select>

<table>

<thead>

<tr>

<th>Termék</th>

<th>Lejár</th>

<th>Nap</th>

<th>Menny</th>

<th>Lista</th>

<th></th>

</tr>

</thead>

<tbody id="list"></tbody>

</table>

</div>

<!-- TÉRKÉP -->

<div id="mapview" class="section">

<h3>Házitérkép</h3>

<div id="map">

<div class="place" id="fridge"><h3>🧊 Hűtő</h3></div>

<div class="place" id="freezer"><h3>❄️ Fagyasztó</h3></div>

<div class="place" id="pantry"><h3>🗄 Kamra</h3></div>

<div class="place" id="bath"><h3>🛁 Fürdő</h3></div>

<div class="place" id="meds"><h3>💊 Gyógyszerek</h3></div>

<div class="place" id="cosmetics"><h3>🧴 Kozmetikumok</h3></div>

</div>

</div>

<!-- SHOPPING -->

<div id="shopping" class="section">

<h3>Bevásárlólista</h3>

<ul id="shoppinglist"></ul>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>

/* LOGIN */

function login(){

let name=document.getElementById("username").value

if(!name) return alert("Adj meg nevet!")

localStorage.setItem("username",name)

document.getElementById("login").classList.remove("active")

show("inventory")

}

/* APP */

let items=JSON.parse(localStorage.getItem("items")||"[]")

function save(){

localStorage.setItem("items",JSON.stringify(items))

}

function show(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

render()

}

function addItem(){

let name=document.getElementById("name").value

let expiry=document.getElementById("expiry").value

let location=document.getElementById("location").value

if(!name) return

items.push({

name,

expiry,

location,

qty:1,

shopping:false

})

save()

render()

}

function removeItem(i){

items.splice(i,1)

save()

render()

}

function sortItems(type){

if(type==="name"){

items.sort((a,b)=>a.name.localeCompare(b.name))

}

if(type==="expiry"){

items.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry))

}

render()

}

function render(){

let list=document.getElementById("list")

list.innerHTML=""

let shopping=document.getElementById("shoppinglist")

shopping.innerHTML=""

document.querySelectorAll(".place").forEach(p=>{

p.querySelectorAll(".itemdot").forEach(d=>d.remove())

})

let now=new Date()

items.forEach((item,i)=>{

let exp=new Date(item.expiry)

let days=Math.ceil((exp-now)/86400000)

let tr=document.createElement("tr")

tr.className=days<0?"expired":days<3?"soon":"good"

tr.innerHTML=`

<td>${item.name}</td>

<td>${item.expiry}</td>

<td>${days}</td>

<td>

<input type="number" value="${item.qty}" min="1"

onchange="items[${i}].qty=this.value;save()">

</td>

<td>

<input type="checkbox"

${item.shopping?"checked":""}

onchange="items[${i}].shopping=this.checked;save();render()">

</td>

<td>

<button onclick="removeItem(${i})">x</button>

</td>

`

list.appendChild(tr)

if(item.shopping){

let li=document.createElement("li")

li.textContent=item.name+" ("+item.qty+")"

shopping.appendChild(li)

}

let dot=document.createElement("div")

dot.className="itemdot"

if(days<0){

dot.style.background="#ff7b7b"

}

else if(days<3){

dot.style.background="#fff3a6"

}

else{

dot.style.background="#b7f5b7"

}

dot.textContent=item.name

document.getElementById(item.location).appendChild(dot)

})

}

render()

/* BARCODE */

let codeReader=new ZXing.BrowserBarcodeReader()

function startScanner(){

let video=document.getElementById("video")

video.style.display="block"

codeReader.decodeFromVideoDevice(null,"video",(result,err)=>{

if(result){

document.getElementById("barcode").value=result.text

codeReader.reset()

video.style.display="none"

}

})

}

</script>

</body>
</html>
