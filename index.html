<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Save It – Before You Waste It</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="loginScreen">

<h1>Save It</h1>
<p class="subtitle">Before You Waste It</p>

<input id="username" placeholder="Felhasználónév">
<input id="password" type="password" placeholder="Jelszó">

<button onclick="login()">Belépés</button>

</div>

<div id="appScreen" style="display:none">

<header>
Save It
<span>Before You Waste It</span>
</header>

<nav>

<button onclick="showMap()">Térkép</button> <button onclick="showShopping()">Bevásárlólista</button> <button onclick="logout()">Kilépés</button>

</nav>

<section id="mapView">

<div class="map">

<div class="place" id="fridge">
<h3>🧊 Hűtő</h3>
</div>

<div class="place" id="freezer">
<h3>❄️ Fagyasztó</h3>
</div>

<div class="place" id="pantry">
<h3>🗄 Kamra</h3>
</div>

<div class="place" id="bath">
<h3>🛁 Fürdő</h3>
</div>

<div class="place" id="meds">
<h3>💊 Gyógyszerek</h3>
</div>

<div class="place" id="cosmetics">
<h3>🧴 Kozmetikumok</h3>
</div>

</div>

<div id="stats">
<h3>Statisztika</h3>
<p>Heti pazarlás: <span id="weekLoss">0</span> Ft</p>
<p>Havi pazarlás: <span id="monthLoss">0</span> Ft</p>
</div>

</section>

<section id="shoppingView" style="display:none">

<h2>Bevásárlólista</h2>
<div id="shoppingList"></div>

</section>

<button id="addButton" onclick="openAddModal()">+</button>

</div>

<div id="modal" class="modal">

<div class="modalBox">

<h2>Új termék</h2>

<input id="itemName" placeholder="Termék neve">

<input id="barcode" placeholder="Barcode (opcionális)">

<input id="quantity" type="number" placeholder="Mennyiség">

<select id="unit">
<option>db</option>
<option>kg</option>
<option>l</option>
</select>

<input id="price" type="number" placeholder="Egységár Ft">

<input id="expiry" type="date">

<select id="location">
<option value="fridge">Hűtő</option>
<option value="freezer">Fagyasztó</option>
<option value="pantry">Kamra</option>
<option value="bath">Fürdő</option>
<option value="meds">Gyógyszerek</option>
<option value="cosmetics">Kozmetikumok</option>
</select>

<label>
<input type="checkbox" id="toShopping">
Bevásárlólistára
</label>

<button onclick="saveItem()">Mentés</button>

</div>

</div>

<div id="itemModal" class="modal">

<div class="modalBox" id="itemDetails"></div>

</div>

<script src="storage.js"></script>

<script src="login.js"></script>

<script src="ui.js"></script>

<script src="app.js"></script>

<script src="barcode.js"></script>

</body>
</html>
