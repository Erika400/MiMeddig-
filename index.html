<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMeddig?</title>

<style>

body{
font-family:Arial;
background:#eef5ff;
padding:20px;
}

h1{
text-align:center;
}

input,select,button{
margin:5px;
padding:6px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.expired{background:#ff7b7b;}
.soon{background:#fff3a6;}
.good{background:#b7f5b7;}

nav button{
margin:5px;
}

.section{
display:none;
}

.active{
display:block;
}

#map{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.place{
border:2px solid #333;
border-radius:10px;
padding:10px;
min-height:120px;
background:white;
}

.place h3{
margin-top:0;
}

.itemdot{
background:#7dff9a;
padding:3px 6px;
border-radius:6px;
display:inline-block;
margin:3px;
font-size:12px;
}

video{
width:250px;
margin-top:10px;
display:none;
border:1px solid #ccc;
}

</style>
</head>

<body>

<h1>🍎 MiMeddig?</h1>

<nav>
<button onclick="show('inventory')">Készlet</button>
<button onclick="show('mapview')">Térkép</button>
<button onclick="show('shopping')">Bevásárlólista</button>
</nav>

<!-- KÉSZLET -->

<div id="inventory" class="section active">

<h3>Új termék</h3>

<input id="name" placeholder="Termék">

<input type="date" id="expiry">

<select id="location">
<option value="fridge">🧊 Hűtő</option>
<option value="freezer">❄️ Fagyasztó</option>
<option value="pantry">🗄 Kamra</option>
<option value="bath">🛁 Fürdő</option>
<option value="meds">💊 Gyógyszerek</option>
<option value="cosmetics">🧴 Kozmetikumok</option>
</select>

<button onclick="addItem()">Hozzáadás</button>

<br>

<input id="barcode" placeholder="Barcode">

<button onclick="startScanner()">📷 Barcode</button>

<video id="video" autoplay></video>

<h3>Készlet</h3>

<select onchange="sortItems(this.value)">
<option value="expiry">Rendezés lejárat szerint</option>
<option value="name">Rendezés név szerint</option>
</select>

<table>

<thead>
<tr>
<th>Termék</th>
<th>Lejár</th>
<th>Nap</th>
<th>Menny.</th>
<th>Lista</th>
<th></th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<!-- TÉRKÉP -->

<div id="mapview" class="section">

<h3>Házitérkép</h3>

<div id="map">

<div class="place" id="fridge">
<h3>🧊 Hűtő</h3>
</div>

<div class="place" id="freezer">
<h3>❄️ Fagyasztó</h3>
</div>

<div class="place" id="pantry">
<h3>🗄 Kamra</h3>
</div>

<div class="place" id="bath">
<h3>🛁 Fürdő</h3>
</div>

<div class="place" id="meds">
<h3>💊 Gyógyszerek</h3>
</div>

<div class="place" id="cosmetics">
<h3>🧴 Kozmetikumok</h3>
</div>

</div>

</div>

<!-- BEVÁSÁRLÓLISTA -->

<div id="shopping" class="section">

<h3>Bevásárlólista</h3>

<ul id="shoppinglist"></ul>

</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>

let items=JSON.parse(localStorage.getItem("items")||"[]")

function save(){
localStorage.setItem("items",JSON.stringify(items))
}

function show(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

render()

}

function addItem(){

let name=document.getElementById("name").value
let expiry=document.getElementById("expiry").value
let location=document.getElementById("location").value

if(!name)return

items.push({
name,
expiry,
location,
qty:1,
shopping:false
})

save()
render()

}

function removeItem(i){

items.splice(i,1)
save()
render()

}

function sortItems(type){

if(type==="name"){
items.sort((a,b)=>a.name.localeCompare(b.name))
}

if(type==="expiry"){
items.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry))
}

render()

}

function render(){

let list=document.getElementById("list")

list.innerHTML=""

let shopping=document.getElementById("shoppinglist")

shopping.innerHTML=""

document.querySelectorAll(".place").forEach(p=>{

p.querySelectorAll(".itemdot").forEach(d=>d.remove())

})

let now=new Date()

items.forEach((item,i)=>{

let exp=new Date(item.expiry)

let days=Math.ceil((exp-now)/86400000)

let tr=document.createElement("tr")

tr.className=days<0?"expired":days<3?"soon":"good"

tr.innerHTML=

`<td>${item.name}</td>
<td>${item.expiry}</td>
<td>${days}</td>
<td>
<input type="number" value="${item.qty}" min="1"
onchange="items[${i}].qty=this.value;save()">
</td>
<td>
<input type="checkbox"
${item.shopping?"checked":""}
onchange="items[${i}].shopping=this.checked;save();render()">
</td>
<td>
<button onclick="removeItem(${i})">x</button>
</td>`

list.appendChild(tr)

if(item.shopping){

let li=document.createElement("li")

li.textContent=item.name+" ("+item.qty+")"

shopping.appendChild(li)

}

let dot=document.createElement("div")

dot.className="itemdot"

dot.textContent=item.name

document.getElementById(item.location).appendChild(dot)

})

}

render()

/* BARCODE */

let codeReader=new ZXing.BrowserBarcodeReader()

function startScanner(){

let video=document.getElementById("video")

video.style.display="block"

codeReader.decodeFromVideoDevice(null,"video",(result,err)=>{

if(result){

document.getElementById("barcode").value=result.text

codeReader.reset()

video.style.display="none"

}

})

}

</script>

</body>
</html><input type="date" id="expiry">
<select id="category">
<option value="food">Étel</option>
<option value="cosmetic">Kozmetikum</option>
<option value="medicine">Gyógyszer</option>
<option value="other">Egyéb</option>
</select>
<select id="status">
<option value="usable">Felhasználható</option>
<option value="preserved">Minőségét megőrzi</option>
</select>
<br>
<input id="barcode" placeholder="Barcode">
<button onclick="startScanner()">Barcode kamera</button>
<br>
<button onclick="addItem()">Hozzáadás</button>
<table>
<thead>
<tr>
<th>Termék</th>
<th>Kategória</th>
<th>Státusz</th>
<th>Lejár</th>
<th>Nap hátra</th>
<th>Mennyiség</th>
<th>Bevásárló lista</th>
<th></th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
<h3>Házitérkép</h3>
<div id="map">
<svg width="100%" height="100%">
<rect x="5%" y="5%" width="40%" height="40%" stroke="#000" fill="none" stroke-width="2" id="fridge"></rect>
<text x="25%" y="4%" text-anchor="middle">Hűtő</text>
<rect x="55%" y="5%" width="40%" height="40%" stroke="#000" fill="none" stroke-width="2" id="pantry"></rect>
<text x="75%" y="4%" text-anchor="middle">Kamra</text>
<rect x="5%" y="55%" width="40%" height="40%" stroke="#000" fill="none" stroke-width="2" id="bath"></rect>
<text x="25%" y="54%" text-anchor="middle">Fürdő</text>
<rect x="55%" y="55%" width="40%" height="40%" stroke="#000" fill="none" stroke-width="2" id="meds"></rect>
<text x="75%" y="54%" text-anchor="middle">Gyógyszer</text>
</svg>
</div>
<video id="video" autoplay></video>
<button onclick="exportCSV()">CSV export</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
let users = JSON.parse(localStorage.getItem('users')||'{}');
let currentUser = null;
let items=[];
function login(){
  let u=document.getElementById('username').value.trim();
  if(!u) return alert('Adj meg felhasználónevet!');
  if(!users[u]) users[u]=[];
  currentUser=u;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  loadItems(); render();
}
function loadItems(){ items = currentUser && users[currentUser] ? users[currentUser] : []; }
function save(){ if(currentUser){ users[currentUser]=items; localStorage.setItem('users',JSON.stringify(users)); }}
function notify(text){ if('Notification' in window){ if(Notification.permission==='granted') new Notification(text); else if(Notification.permission!=='denied') Notification.requestPermission().then(p=>{if(p==='granted') new Notification(text);}); }}
function addItem(){
  let name=document.getElementById('name').value.trim();
  if(!name) return alert('Adj meg terméket!');
  let expiry=document.getElementById('expiry').value;
  let category=document.getElementById('category').value;
  let status=document.getElementById('status').value;
  let barcode=document.getElementById('barcode').value.trim();
  items.push({name,expiry,category,status,barcode,qty:1,alert:2,onShoppingList:false,notified:false});
  save(); render();
  document.getElementById('name').value=''; document.getElementById('expiry').value=''; document.getElementById('barcode').value='';
}
function removeItem(i){ items.splice(i,1); save(); render(); }
function render(){
  loadItems();
  let now=new Date();
  let list=document.getElementById('list'); list.innerHTML='';
  let map=document.getElementById('map'); map.querySelectorAll('.dot').forEach(d=>d.remove());
  let autoShopping=document.getElementById('autoShopping').checked;
  items.forEach((item,i)=>{
    let exp=item.expiry?new Date(item.expiry):new Date(Date.now()+4*86400000);
    let days=Math.ceil((exp-now)/86400000);
    if(autoShopping && days<=1 && !item.onShoppingList){ item.onShoppingList=true; }
    let tr=document.createElement('tr');
    tr.className=days<0?'expired':days<=item.alert?'soon':item.status==='usable'?'usable':'preserved';
    tr.innerHTML=`<td>${item.name}</td><td>${item.category}</td><td>${item.status}</td><td>${exp.toISOString().split('T')[0]}</td><td>${days}</td><td><input type='number' value='${item.qty}' min='1' onchange='items[${i}].qty=this.value; save(); render();'></td><td><input type='checkbox' ${item.onShoppingList?'checked':''} onchange='items[${i}].onShoppingList=this.checked; save(); render();'></td><td><button onclick="removeItem(${i})">töröl</button></td>`;
    list.appendChild(tr);
    if(days<=item.alert && !item.notified){ notify(item.name+' hamarosan lejár!'); item.notified=true; }
    let dot=document.createElement('div');
    dot.className='dot';
    dot.textContent=item.name;
    let parentId=item.category==='food'?'fridge':item.category==='cosmetic'?'bath':item.category==='medicine'?'meds':'pantry';
    let parent=document.getElementById(parentId);
    dot.style.left=Math.random()*80+'%'; dot.style.top=Math.random()*80+'%';
    dot.style.background = days<0?'#ff5c5c':days<=item.alert?'#ffe066':item.status==='usable'?'#7dff9a':'#b3ffd9';
    if(item.onShoppingList) dot.classList.add('shopping');
    dot.onclick=()=>{ item.onShoppingList=!item.onShoppingList; save(); render(); };
    parent.appendChild(dot);
  });
  save();
}
function exportCSV(){
  let csv='name,category,status,expiry,qty,onShoppingList\n';
  items.forEach(i=>{csv+=`${i.name},${i.category},${i.status},${i.expiry},${i.qty},${i.onShoppingList}\n`;});
  let blob=new Blob([csv]); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='lista.csv'; a.click();
}
function startScanner(){
  document.getElementById('video').style.display='block';
  Quagga.init({inputStream:{type:'LiveStream', target:document.querySelector('#video'), constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','code_128_reader','upc_reader']}}, err=>{if(err){console.log(err); return;} Quagga.start();});
  Quagga.onDetected(result=>{
    let code=result.codeResult.code;
    document.getElementById('barcode').value=code;
    alert('Vonalkód leolvasva: '+code);
    Quagga.stop(); document.getElementById('video').style.display='none';
  });
}
</script>
</body>
</html>
